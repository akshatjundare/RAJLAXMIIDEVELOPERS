<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAJLAXMII DEVELOPERS | Admin Dashboard</title>
    <link rel="stylesheet" href="admin-style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    /* --- Google Fonts & Core Variables --- */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    list-style: none;
    text-decoration: none;
}

:root {
    --bg-dark-prime: #0A0A0A;    /* Absolute Black Background */
    --bg-dark-sec: #121212;      /* Structural Sidebar & Panels */
    --bg-dark-card: #1A1A1A;     /* Cards & Input Fields */
    --accent-gold: #D4AF37;      /* Luxury Accent Gold */
    --text-light: #E5E5E5;       /* Primary Text */
    --text-muted: #888888;       /* Subtle Text */
    --border-color: #222222;     /* Divider Colors */
}

body {
    background-color: var(--bg-dark-prime);
    color: var(--text-light);
    display: flex;
    overflow-x: hidden;
}

/* --- Sidebar --- */
.sidebar {
    width: 260px;
    background-color: var(--bg-dark-sec);
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid var(--border-color);
    z-index: 100;
}

.sidebar-brand {
    padding: 30px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text-light);
}

.sidebar-brand span {
    color: var(--accent-gold);
}

.sidebar-menu {
    flex-grow: 1;
    padding: 20px 0;
}

.sidebar-menu li {
    width: 100%;
    margin-bottom: 5px;
}

.sidebar-menu a {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px 30px;
    color: var(--text-muted);
    font-size: 14px;
    transition: all 0.3s;
}

.sidebar-menu a i {
    font-size: 16px;
    width: 20px;
}

.sidebar-menu a:hover, .sidebar-menu a.active {
    color: var(--text-light);
    background-color: var(--bg-dark-card);
    border-left: 3px solid var(--accent-gold);
}

.badge-count {
    background-color: var(--accent-gold);
    color: var(--bg-dark-prime);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
}

.sidebar-footer {
    padding: 30px;
    border-top: 1px solid var(--border-color);
}

.sidebar-footer a {
    color: var(--text-muted);
    font-size: 14px;
    transition: color 0.3s;
}

.sidebar-footer a:hover {
    color: #FF4D4D;
}

/* --- Main Dashboard Area --- */
.main-content {
    margin-left: 260px;
    width: calc(100% - 260px);
    min-height: 100vh;
    padding: 40px;
}

.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 30px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 40px;
}

.dashboard-header h2 {
    font-size: 26px;
    font-weight: 500;
}

.user-wrapper {
    display: flex;
    align-items: center;
    gap: 25px;
}

.notification-icon {
    font-size: 20px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
}

.notification-icon:hover { color: var(--accent-gold); }

/* --- Metrics Grid --- */
.analytics-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 30px;
    margin-bottom: 40px;
}

.card-single {
    background-color: var(--bg-dark-sec);
    padding: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border-color);
    transition: border-color 0.3s;
    max-width: 350px; /* Limits size since there is only one card now */
}

.card-single:hover {
    border-color: var(--accent-gold);
}

.card-single h1 {
    font-size: 32px;
    color: var(--text-light);
    margin-bottom: 5px;
}

.card-single span {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.card-single i {
    font-size: 36px;
    color: var(--accent-gold);
    opacity: 0.8;
}

/* --- Data Table Container --- */
.data-section {
    background-color: var(--bg-dark-sec);
    border: 1px solid var(--border-color);
    padding: 30px;
}

.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.table-header h3 {
    font-size: 18px;
    font-weight: 500;
}

.btn-export {
    background: transparent;
    border: 1px solid #444;
    color: var(--text-light);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-export:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
}

/* --- Responsive Layout Table styling --- */
.table-responsive {
    width: 100%;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
}

thead tr {
    border-bottom: 2px solid var(--border-color);
}

th {
    padding: 15px 12px;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.5px;
}

td {
    padding: 18px 12px;
    border-bottom: 1px solid var(--border-color);
    font-size: 14px;
    vertical-align: middle;
}

tr:hover td {
    background-color: rgba(255, 255, 255, 0.01);
}

.contact-td i {
    font-size: 12px;
    margin-right: 5px;
}

.property-tag {
    background-color: var(--bg-dark-card);
    border: 1px solid var(--border-color);
    padding: 4px 10px;
    font-size: 12px;
    white-space: nowrap;
}

.msg-preview {
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-muted);
}

/* --- Status Badges --- */
.status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.status-pending { background-color: rgba(212, 175, 55, 0.15); color: var(--accent-gold); }
.status-contacted { background-color: rgba(30, 136, 229, 0.15); color: #1E88E5; }
.status-closed { background-color: rgba(67, 160, 71, 0.15); color: #43A047; }

/* --- Action Buttons --- */
.actions-group {
    display: flex;
    gap: 8px;
}

.action-btn {
    border: none;
    padding: 6px 10px;
    cursor: pointer;
    background-color: var(--bg-dark-card);
    color: var(--text-muted);
    transition: all 0.3s;
}

.action-btn.view:hover { color: var(--accent-gold); }
.action-btn.delete:hover { color: #FF4D4D; }

/* --- Tablet/Desktop Responsive rules --- */
@media (max-width: 992px) {
    .sidebar { width: 70px; }
    .sidebar-brand, .sidebar-footer, .sidebar-menu span, .badge-count { display: none; }
    .sidebar-menu a { justify-content: center; padding: 20px 0; }
    .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 25px; }
}
</style>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="sidebar-brand">
            RAJLAXMI<span>ADMIN</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-envelope-open-text"></i> Enquiries <span class="badge-count">3</span></a>
            </li>
            <li><a href="#"><i class="fas fa-users"></i> Registered Clients</a></li>
            <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html"><i class="fas fa-sign-out-alt"></i> Back to Main Site</a>
        </div>
    </div>

    <!-- Main Dashboard Body -->
    <div class="main-content">
        <!-- Top Bar -->
        <header class="dashboard-header">
            <h2>Overview Dashboard</h2>
            <div class="user-wrapper">
                <i class="fas fa-bell notification-icon"></i>
            </div>
        </header>

        <!-- Stats Overview Cards -->
        <div class="analytics-cards">
            <div class="card-single">
                <div>
                    <h1 id="total-enquiries">3</h1>
                    <span>Total Enquiries</span>
                </div>
                <div>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
        </div>

        <!-- Enquiries Data Section -->
        <section class="data-section">
            <div class="table-header">
                <h3>Recent Property Enquiries</h3>
                <button class="btn-export"><i class="fas fa-download"></i> Export CSV</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Client Name</th>
                            <th>Contact Information</th>
                            <th>Property of Interest</th>
                            <th>Date Received</th>
                            <th>Message Preview</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="enquiry-table-body">
                        <!-- Dynamic JavaScript Rows will inject here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Dynamic Dashboard Script -->
    <script>
        // Mock Database of Enquiry Registration Submissions
        const enquiryData = [
            {
                name: "Alexander Mercer",
                email: "a.mercer@luxuryholdings.com",
                phone: "+1 (310) 555-0192",
                property: "The Grand Horizon Villa",
                date: "July 04, 2026",
                message: "Looking to schedule a private viewing this coming Tuesday. Financial pre-approval is verified.",
                status: "Pending"
            },
            {
                name: "Elena Rostova",
                email: "elena.ros@vanguard.io",
                phone: "+1 (212) 443-8901",
                property: "Skyline Modern Apartment",
                date: "July 02, 2026",
                message: "Is the penthouse variant available for lease starting next month?",
                status: "Contacted"
            },
            {
                name: "Marcus Vance",
                email: "marcus.vance@vancecorp.com",
                phone: "+1 (786) 221-9043",
                property: "Sunset Contemporary Home",
                date: "June 29, 2026",
                message: "Interested in putting down an all-cash escrow offer. Please have the listing agent call me ASAP.",
                status: "Closed"
            }
        ];

        const tableBody = document.getElementById('enquiry-table-body');

        // Render Table Rows dynamically
        enquiryData.forEach(client => {
            const row = document.createElement('tr');

            // Determine dynamic CSS class for status badges
            let statusClass = 'status-pending';
            if (client.status === 'Contacted') statusClass = 'status-contacted';
            if (client.status === 'Closed') statusClass = 'status-closed';

            row.innerHTML = `
                <td><strong>${client.name}</strong></td>
                <td>
                    <div class="contact-td"><i class="fas fa-envelope"></i> ${client.email}</div>
                    <div class="contact-td" style="color: var(--accent-gold); margin-top:4px;"><i class="fas fa-phone"></i> ${client.phone}</div>
                </td>
                <td><span class="property-tag">${client.property}</span></td>
                <td>${client.date}</td>
                <td><p class="msg-preview" title="${client.message}">${client.message}</p></td>
                <td><span class="status-badge ${statusClass}">${client.status}</span></td>
                <td>
                    <div class="actions-group">
                        <button class="action-btn view" onclick="alert('Message: ${client.message}')"><i class="fas fa-eye"></i></button>
                        <button class="action-btn delete" onclick="this.closest('tr').remove()"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Use the exact same config object here
    const firebaseConfig = {
        apiKey: "AIzaSyA0N1if_E28-j6gnkggQxRraLLdyDM2n7U",
        authDomain: "rajlaxmiidevelopers- dedce.firebaseapp.com",
        projectId: "rajlaxmiidevelopers-dedce",
        storageBucket: "rajlaxmiidevelopers-dedce.firebasestorage.app",
        messagingSenderId: "1032171859495",
        appId: "1: 1032171859495: web: 5958c2097a15c457a92802"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tableBody = document.getElementById('enquiry-table-body');
    const counterDisplay = document.getElementById('total-enquiries');
    const sidebarBadge = document.querySelector('.badge-count');

    // Query database: Listen to "enquiries" ordered by newest timestamp
    const q = query(collection(db, "enquiries"), orderBy("timestamp", "desc"));

    // Real-time listener: updates automatically when someone submits an enquiry
    onSnapshot(q, (snapshot) => {
        tableBody.innerHTML = ""; // Clear table row layout
        let totalCount = snapshot.size;

        // Update KPI UI counters
        if (counterDisplay) counterDisplay.innerText = totalCount;
        if (sidebarBadge) sidebarBadge.innerText = totalCount;

        if (totalCount === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">No enquiries found.</td></tr>`;
            return;
        }

        snapshot.forEach((docSnap) => {
            const client = docSnap.data();
            const docId = docSnap.id;

            // Handle Timestamp conversion safely
            let dateString = "Just Now";
            if (client.timestamp) {
                dateString = client.timestamp.toDate().toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', year: 'numeric'
                });
            }

            const row = document.createElement('tr');
            let statusClass = 'status-pending';
            if (client.status === 'Contacted') statusClass = 'status-contacted';
            if (client.status === 'Closed') statusClass = 'status-closed';

            row.innerHTML = `
          <td><strong>${client.name || 'Anonymous'}</strong></td>
          <td>
              <div class="contact-td"><i class="fas fa-envelope"></i> ${client.email}</div>
              <div class="contact-td" style="color: var(--accent-gold); margin-top:4px;"><i class="fas fa-phone"></i> ${client.phone}</div>
          </td>
          <td><span class="property-tag">${client.property}</span></td>
          <td>${dateString}</td>
          <td><p class="msg-preview" title="${client.message}">${client.message}</p></td>
          <td>
              <select class="status-badge ${statusClass}" onchange="updateStatus('${docId}', this.value)" style="background:var(--bg-dark-card); color:inherit; border:1px solid var(--border-color); cursor:pointer;">
                  <option value="Pending" ${client.status === 'Pending' ? 'selected' : ''}>Pending</option>
                  <option value="Contacted" ${client.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                  <option value="Closed" ${client.status === 'Closed' ? 'selected' : ''}>Closed</option>
              </select>
          </td>
          <td>
              <div class="actions-group">
                  <button class="action-btn view" onclick="alert(\`Message: ${client.message}\`)"><i class="fas fa-eye"></i></button>
                  <button class="action-btn delete" onclick="deleteEnquiry('${docId}')"><i class="fas fa-trash"></i></button>
              </div>
          </td>
      `;
            tableBody.appendChild(row);
        });
    });

    // Function to change status inside database
    window.updateStatus = async (id, newStatus) => {
        const docRef = doc(db, "enquiries", id);
        await updateDoc(docRef, { status: newStatus });
    };

    // Function to delete document entry completely
    window.deleteEnquiry = async (id) => {
        if (confirm("Are you sure you want to delete this log entry permanently?")) {
            await deleteDoc(doc(db, "enquiries", id));
        }
    };
</script>
</html>
